# Nginx config for the PowerApps.blog API (VPS).
#
# Architecture:
#   www.powerapps.blog    -> Cloudflare Worker (frontend SSR)        [no nginx]
#   admin.powerapps.blog  -> same Cloudflare Worker (/admin/* routes) [no nginx]
#   api.powerapps.blog    -> this VPS, reverse-proxied to Hono on :4000
#
# DNS: point api.powerapps.blog at this server's IP (Cloudflare orange-cloud
# proxy is fine). www + admin are custom domains on the Worker, so they do not
# touch this box.
#
# Install: copy to /etc/nginx/sites-available/powerapps-api.conf,
#   ln -s ../sites-available/powerapps-api.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

upstream powerapps_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.powerapps.blog;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.powerapps.blog;

    # TLS: use a Cloudflare Origin Certificate (recommended with orange cloud)
    # or Let's Encrypt via certbot. Update these paths accordingly.
    ssl_certificate     /etc/ssl/powerapps/api.crt;
    ssl_certificate_key /etc/ssl/powerapps/api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Cloudinary uploads can be a few MB.
    client_max_body_size 25m;

    access_log /var/log/nginx/powerapps-api.access.log;
    error_log  /var/log/nginx/powerapps-api.error.log;

    location / {
        proxy_pass http://powerapps_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # Note: CORS is handled by the Hono API (server/index.ts), not nginx.
}
