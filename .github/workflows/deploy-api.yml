name: Deploy API (VPS)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "ecosystem.config.cjs"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/powerapps-blog
            git pull origin main
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            pm2 reload powerapps-blog-api --update-env || pm2 start ecosystem.config.cjs
            pm2 save
